<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBEZYANA MAY CRY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ СТИЛЯ */
        body {
            background-color: #0c0202;
            color: #ffffff;
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(circle, #1a0505 0%, #000000 100%);
        }

        /* КНОПКА LOGIN НАВЕРХУ */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .top-login-btn {
            background: linear-gradient(to bottom, #555, #222);
            border: 1px solid #444;
            border-radius: 12px;
            color: #ccc;
            padding: 6px 20px;
            font-size: 13px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        /* ОКНО ИНТЕРФЕЙСА */
        .main-window {
            border: 2px solid #8B0000;
            background-color: #000000;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        /* ЭКРАН 1: СЕКРЕТНЫЙ ВХОД */
        .auth-panel {
            padding: 60px 20px;
            text-align: center;
        }

        .input-label {
            display: block;
            margin-bottom: 20px;
            color: #8B0000;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .code-input {
            background-color: #0a0a0a;
            border: 1px solid #8B0000;
            color: #ffffff;
            padding: 10px;
            font-family: 'Courier Prime', monospace;
            font-size: 16px;
            text-align: center;
            width: 80%;
            max-width: 250px;
            margin-bottom: 20px;
            outline: none;
        }

        .submit-btn {
            background-color: #8B0000;
            border: 1px solid #ff0000;
            color: #fff;
            padding: 10px 25px;
            font-family: 'Courier Prime', monospace;
            cursor: pointer;
            text-transform: uppercase;
        }

        .error-text {
            color: #ff0000;
            margin-top: 15px;
            font-size: 12px;
            visibility: hidden;
        }

        /* ЭКРАН 2: ОДИН В ОДИН С РЕФЕРЕНСОМ */
        .profile-interface {
            display: none; /* Скрыто до ввода пароля */
            flex-direction: row;
            flex-wrap: wrap;
            width: 100%;
        }

        /* ЛЕВАЯ КОЛОНКА (СЕЛЕКТ ПЕРСОНАЖА + БОЛЬШАЯ ФОТКА) */
        .char-select-column {
            flex: 1;
            min-width: 280px;
            border-right: 1px solid #8B0000;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .column-title {
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 14px;
            letter-spacing: 1px;
            border-bottom: 1px solid #111;
        }

        .image-wrapper {
            width: 100%;
            flex-grow: 1;
            display: flex;
            background-color: #050505;
            overflow: hidden;
        }

        /* Твой арт из Пинтереста во весь размер левой панели */
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ПРАВАЯ КОЛОНКА (ТАБЛИЦА С ХАРАКТЕРИСТИКАМИ) */
        .data-column {
            flex: 1.3;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #8B0000;
            border-left: 1px solid #8B0000;
            font-size: 14px;
        }

        .stats-table td:first-child {
            border-left: none;
            width: 100px;
            color: #ffffff;
        }

        .stats-table td:last-child {
            color: #ffffff;
            text-align: right;
            text-transform: uppercase;
        }

        /* ПУСТАЯ ПАНЕЛЬ ДЛЯ ТВОЕГО ТЕКСТА (Зона "Кастомизация") */
        .custom-text-area {
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
            flex-grow: 1;
            background-color: #020202;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="top-login-btn" id="top-btn">log in | sign up</button>
    </div>

    <div class="main-window">
        
        <div id="auth-panel" class="auth-panel">
            <label for="pass-field" class="input-label">ENTER OBEZYANA CODE:</label>
            <input type="text" id="pass-field" class="code-input" autocomplete="off" placeholder="CODE...">
            <br>
            <button onclick="checkAccess()" class="submit-btn">ENTER</button>
            <div id="error-alert" class="error-text">ACCESS DENIED</div>
        </div>

        <div id="profile-interface" class="profile-interface">
            
            <div class="char-select-column">
                <div class="column-title">select character</div>
                <div class="image-wrapper">
                    <img src="https://i.pinimg.com/736xl/08/94/39/08943961ef429e7104bda9b9643fcc88.jpg" alt="Dante DMC">
                </div>
            </div>

            <div class="data-column">
                <table class="stats-table">
                    <tr>
                        <td>name:</td>
                        <td>ANGELO</td>
                    </tr>
                    <tr>
                        <td>age:</td>
                        <td>21</td>
                    </tr>
                    <tr>
                        <td>specie:</td>
                        <td>human</td>
                    </tr>
                    <tr>
                        <td>weapon:</td>
                        <td>spear LEVEL 10</td>
                    </tr>
                </table>

                <div class="custom-text-area">
                    здесь будет твой текст (likes, dislikes и всё остальное), когда ты его придумаешь...
                </div>
            </div>

        </div>
    </div>

    <script>
        // Проверка пароля
        function checkAccess() {
            var val = document.getElementById('pass-field').value.trim().toLowerCase();
            var err = document.getElementById('error-alert');
            
            if (val === 'angelo') {
                document.getElementById('auth-panel').style.display = 'none';
                document.getElementById('profile-interface').style.display = 'flex';
                document.getElementById('top-btn').innerText = 'welcome';
            } else {
                err.style.visibility = 'visible';
            }
        }
    </script>
</body>
</html>
